<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruleta de Ludo</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Quicksand',sans-serif;background:#0D1B2A;min-height:100vh;display:flex;flex-direction:column;align-items:center;color:#fff;overflow-x:hidden}
.game{position:relative;z-index:1;width:100%;max-width:480px;padding:16px}

.header{text-align:center;margin-bottom:12px}
.header h1{font-family:'Lilita One',cursive;font-size:1.7rem;color:#4FC3F7}
.header p{font-size:.8rem;color:rgba(255,255,255,.4);margin-top:2px}

.score-bar{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.06);border-radius:16px;padding:8px 16px;margin-bottom:14px;border:1px solid rgba(255,255,255,.08)}
.score-item{display:flex;align-items:center;gap:6px;font-weight:700;font-size:.95rem}
.score-item .num{font-family:'Lilita One',cursive;font-size:1.3rem}
.stars-row{display:flex;gap:2px}
.star{font-size:1.2rem;filter:grayscale(1) opacity(.3);transition:transform .3s}
.star.earned{filter:none;animation:popStar .4s ease-out}
@keyframes popStar{0%{transform:scale(.3) rotate(-30deg)}60%{transform:scale(1.4) rotate(10deg)}100%{transform:scale(1)}}

.wheel-area{position:relative;width:280px;height:280px;margin:0 auto 16px}
.pointer{position:absolute;top:-16px;left:50%;transform:translateX(-50%);z-index:10;width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:26px solid #FFD600;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
canvas#wheel{width:280px;height:280px;border-radius:50%;box-shadow:0 0 0 5px rgba(255,255,255,.1),0 0 30px rgba(79,195,247,.15);cursor:pointer}
canvas#wheel.spinning{cursor:default}
.spin-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Lilita One',cursive;font-size:.65rem;color:#0D1B2A;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.3);z-index:5}

.waiting-msg{font-family:'Lilita One',cursive;font-size:1.2rem;color:rgba(255,255,255,.45);text-align:center;margin-top:12px}
.waiting-msg span{color:#FFD600}

.q-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:22px 18px;text-align:center;min-height:220px;display:none;flex-direction:column;justify-content:center;transition:border-color .3s,box-shadow .3s}
.q-card.show{display:flex}
.q-card.correct-glow{border-color:#43A047;box-shadow:0 0 25px rgba(67,160,71,.25)}
.q-card.wrong-glow{border-color:#E91E63;box-shadow:0 0 25px rgba(233,30,99,.25)}

.q-cat{font-size:.7rem;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.35);margin-bottom:4px}
.q-emoji{font-size:2.5rem;margin-bottom:6px}
.q-scene{font-size:1rem;color:rgba(255,255,255,.7);margin-bottom:4px;line-height:1.3}
.q-sent{font-family:'Lilita One',cursive;font-size:1.3rem;margin-bottom:16px;line-height:1.3}
.blank{display:inline-block;border-bottom:3px solid #FFD600;min-width:70px;color:#FFD600}

.answers{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ans-btn{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.12);border-radius:14px;padding:12px 6px;font-family:'Lilita One',cursive;font-size:1.15rem;color:#fff;cursor:pointer;transition:all .15s}
.ans-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);transform:translateY(-2px)}
.ans-btn .hint{display:block;font-family:'Quicksand',sans-serif;font-size:.6rem;font-weight:500;color:rgba(255,255,255,.3);margin-top:2px}
.ans-btn.correct{background:#43A047!important;border-color:#43A047!important}
.ans-btn.wrong{background:#E91E63!important;border-color:#E91E63!important;opacity:.7}
.ans-btn:disabled{cursor:default;pointer-events:none}

.feedback{text-align:center;margin-top:12px;font-family:'Lilita One',cursive;font-size:1.1rem;min-height:28px}
.feedback.ok{color:#43A047}
.feedback.no{color:#E91E63}

.explain{background:rgba(255,255,255,.05);border-radius:12px;padding:10px 14px;margin-top:8px;font-size:.82rem;color:rgba(255,255,255,.6);line-height:1.4;text-align:left;display:none}
.explain b{color:#4FC3F7}
.explain.show{display:block}

.next-btn{margin-top:14px;background:linear-gradient(135deg,#4FC3F7,#FF8A65);border:none;border-radius:14px;padding:12px 28px;font-family:'Lilita One',cursive;font-size:1rem;color:#fff;cursor:pointer;box-shadow:0 4px 14px rgba(79,195,247,.25);display:none}
.next-btn.show{display:inline-block}
.next-btn:hover{transform:translateY(-2px)}

.trophy{text-align:center;padding:30px 16px;display:none}
.trophy.show{display:block}
.trophy .big{font-size:4.5rem;animation:float 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.trophy h2{font-family:'Lilita One',cursive;font-size:1.6rem;margin:12px 0 6px;color:#FFD600}
.trophy .final{font-size:.95rem;color:rgba(255,255,255,.5);margin-bottom:14px}
.trophy .sf{font-size:1.8rem;margin-bottom:14px;letter-spacing:4px}
.trophy .msg{font-size:1rem;color:rgba(255,255,255,.7);margin-bottom:20px;line-height:1.4}
.replay-btn{background:linear-gradient(135deg,#4FC3F7,#1565C0);border:none;border-radius:14px;padding:12px 36px;font-family:'Lilita One',cursive;font-size:1rem;color:#fff;cursor:pointer;box-shadow:0 4px 14px rgba(21,101,192,.3)}

.confetti{position:fixed;width:10px;height:10px;border-radius:2px;z-index:100;pointer-events:none;animation:cfall 2.5s ease-out forwards}
@keyframes cfall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(.3)}}
</style>
</head>
<body>
<div class="game">
  <div class="header">
    <h1>La Ruleta de Ludo</h1>
    <p>THIS · THESE · THAT · THOSE</p>
  </div>
  <div class="score-bar">
    <div class="score-item">✅ <span class="num" id="s-ok">0</span></div>
    <div class="stars-row" id="stars"></div>
    <div class="score-item">❌ <span class="num" id="s-no">0</span></div>
  </div>
  <div class="wheel-area" id="wa">
    <div class="pointer"></div>
    <canvas id="wheel" width="560" height="560"></canvas>
    <div class="spin-label" id="sl">GIRA!</div>
  </div>
  <p class="waiting-msg" id="wm">Toca la ruleta para <span>girar!</span></p>
  <div class="q-card" id="qc">
    <div class="q-cat" id="qcat"></div>
    <div class="q-emoji" id="qem"></div>
    <div class="q-scene" id="qsc"></div>
    <div class="q-sent" id="qse"></div>
    <div class="answers" id="ans"></div>
    <div class="feedback" id="fb"></div>
    <div class="explain" id="ex"></div>
    <button class="next-btn" id="nb" onclick="nextRound()">Siguiente ➜</button>
  </div>
  <div class="trophy" id="tr">
    <div class="big" id="trem"></div>
    <h2 id="trt"></h2>
    <div class="final" id="trf"></div>
    <div class="sf" id="trs"></div>
    <div class="msg" id="trm"></div>
    <button class="replay-btn" onclick="resetGame()">Jugar de nuevo</button>
  </div>
</div>

<script>
// ── AUDIO (Web Audio API nativo) ──
let actx = null;
function ensureAudio(){
  if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
}
function tone(freq,start,dur,vol,type){
  if(!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type||'triangle'; o.frequency.value=freq;
  g.gain.setValueAtTime(Math.min(vol||.12,.3),start);
  g.gain.exponentialRampToValueAtTime(.001,start+dur);
  o.connect(g); g.connect(actx.destination);
  o.start(start); o.stop(start+dur+.05);
}
const F={C4:262,E4:330,G4:392,C5:523,E5:659,G5:784,A5:880,C6:1047,E6:1319,G6:1568};
function sndTick(){if(!actx)return;tone(880,actx.currentTime,.025,.06,'sine')}
function sndSpin(){if(!actx)return;const t=actx.currentTime;tone(F.G5,t,.08,.1);tone(F.C6,t+.1,.08,.08)}
function sndOk(){if(!actx)return;const t=actx.currentTime;tone(F.C5,t,.1,.12);tone(F.E5,t+.11,.1,.12);tone(F.G5,t+.22,.1,.14);tone(F.C6,t+.33,.2,.16)}
function sndNo(){if(!actx)return;const t=actx.currentTime;tone(F.E4,t,.18,.1);tone(F.C4,t+.22,.3,.07)}
function sndStar(){if(!actx)return;const t=actx.currentTime;tone(F.E6,t,.05,.08,'sine');tone(1568,t+.07,.08,.06,'sine')}
function sndFanfare(){
  if(!actx)return;const t=actx.currentTime;
  [F.C5,F.E5,F.G5,F.C6,F.E6,F.G5,F.C6,F.E6,F.C6,F.G6].forEach((f,i)=>{
    tone(f,t+i*.14,i>=8?.35:.1,.08+i*.01);
  });
  const ct=t+10*.14;
  [F.C5,F.E5,F.G5,F.C6].forEach(f=>tone(f,ct,.7,.1));
}

// ── QUESTIONS ──
const QS=[
  {emoji:"📖",scene:"Un libro en TU mano",sent:"___ is a book.",ans:"THIS",exp:"Esta <b>CERCA</b> (tu mano) y es <b>UNO</b> → <b>THIS</b>",cat:"Cerca + Uno"},
  {emoji:"✏️",scene:"Un lapiz en TU mesa",sent:"___ is my pencil.",ans:"THIS",exp:"Esta <b>CERCA</b> (tu mesa) y es <b>UNO</b> → <b>THIS</b>",cat:"Cerca + Uno"},
  {emoji:"📏",scene:"Una regla en TU cartuchera",sent:"___ is my ruler.",ans:"THIS",exp:"Esta <b>CERCA</b> (tu cartuchera) y es <b>UNA</b> → <b>THIS</b>",cat:"Cerca + Uno"},
  {emoji:"🎒",scene:"Tu mochila aca al lado tuyo",sent:"___ is my school bag.",ans:"THIS",exp:"Esta <b>CERCA</b> (al lado tuyo) y es <b>UNA</b> → <b>THIS</b>",cat:"Cerca + Uno"},
  {emoji:"📖📖📖",scene:"Tres libros en TU banco",sent:"___ are my books.",ans:"THESE",exp:"Estan <b>CERCA</b> (tu banco) y son <b>MUCHOS</b> → <b>THESE</b>",cat:"Cerca + Muchos"},
  {emoji:"✏️✏️",scene:"Dos lapices en TU mano",sent:"___ are my pencils.",ans:"THESE",exp:"Estan <b>CERCA</b> (tu mano) y son <b>MUCHOS</b> → <b>THESE</b>",cat:"Cerca + Muchos"},
  {emoji:"📓📓📓",scene:"Cuadernos en TU mesa",sent:"___ are my notebooks.",ans:"THESE",exp:"Estan <b>CERCA</b> (tu mesa) y son <b>MUCHOS</b> → <b>THESE</b>",cat:"Cerca + Muchos"},
  {emoji:"🏫",scene:"La escuela de la otra cuadra",sent:"___ is a school.",ans:"THAT",exp:"Esta <b>LEJOS</b> (otra cuadra) y es <b>UNA</b> → <b>THAT</b>",cat:"Lejos + Uno"},
  {emoji:"🏋️",scene:"El gimnasio al fondo del pasillo",sent:"___ is the gym.",ans:"THAT",exp:"Esta <b>LEJOS</b> (fondo del pasillo) y es <b>UNO</b> → <b>THAT</b>",cat:"Lejos + Uno"},
  {emoji:"📚",scene:"La biblioteca del otro piso",sent:"___ is the library.",ans:"THAT",exp:"Esta <b>LEJOS</b> (otro piso) y es <b>UNA</b> → <b>THAT</b>",cat:"Lejos + Uno"},
  {emoji:"🚿",scene:"El bano del otro lado de la escuela",sent:"___ is the bathroom.",ans:"THAT",exp:"Esta <b>LEJOS</b> (otro lado) y es <b>UNO</b> → <b>THAT</b>",cat:"Lejos + Uno"},
  {emoji:"📖📖📖",scene:"Libros en la otra mesa alla lejos",sent:"___ are books.",ans:"THOSE",exp:"Estan <b>LEJOS</b> (otra mesa) y son <b>MUCHOS</b> → <b>THOSE</b>",cat:"Lejos + Muchos"},
  {emoji:"✏️✏️✏️",scene:"Lapices en el piso del pasillo",sent:"___ are pencils.",ans:"THOSE",exp:"Estan <b>LEJOS</b> (pasillo) y son <b>MUCHOS</b> → <b>THOSE</b>",cat:"Lejos + Muchos"},
  {emoji:"🪑🪑",scene:"Sillas en el salon de al lado",sent:"___ are chairs.",ans:"THOSE",exp:"Estan <b>LEJOS</b> (otro salon) y son <b>MUCHAS</b> → <b>THOSE</b>",cat:"Lejos + Muchos"},
];

const ROUNDS=10, STAR_AT=[2,4,6,8,10];
let ok=0,no=0,rnd=0,answered=false,used=[];

// ── WHEEL ──
const segs=[
  {label:"CERCA\nUNO",color:"#1565C0",f:"THIS"},
  {label:"LEJOS\nMUCHOS",color:"#E65100",f:"THOSE"},
  {label:"CERCA\nMUCHOS",color:"#0288D1",f:"THESE"},
  {label:"LEJOS\nUNO",color:"#BF360C",f:"THAT"},
  {label:"CERCA\nUNO",color:"#1976D2",f:"THIS"},
  {label:"LEJOS\nMUCHOS",color:"#D84315",f:"THOSE"},
  {label:"CERCA\nMUCHOS",color:"#0277BD",f:"THESE"},
  {label:"LEJOS\nUNO",color:"#E65100",f:"THAT"},
];

const cvs=document.getElementById('wheel');
const ctx=cvs.getContext('2d');
let angle=0,spinning=false;

function drawWheel(a){
  const cx=280,cy=280,r=270,n=segs.length,arc=2*Math.PI/n;
  ctx.clearRect(0,0,560,560);
  segs.forEach((s,i)=>{
    const st=a+i*arc,en=st+arc;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,st,en);ctx.closePath();
    ctx.fillStyle=s.color;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=2;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(st+arc/2);
    ctx.textAlign='center';ctx.fillStyle='#fff';ctx.font='bold 20px Quicksand';
    s.label.split('\n').forEach((l,li,arr)=>{
      ctx.fillText(l,r*.58,(li-(arr.length-1)/2)*22+4);
    });
    ctx.restore();
  });
  ctx.beginPath();ctx.arc(cx,cy,42,0,2*Math.PI);
  ctx.fillStyle='#0D1B2A';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=2;ctx.stroke();
}
drawWheel(0);

function winner(a){
  const n=segs.length,arc=2*Math.PI/n;
  const ptr=3*Math.PI/2;
  const nm=((ptr-a)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  return segs[Math.floor(nm/arc)%n];
}

cvs.onclick=()=>{
  if(spinning||rnd>=ROUNDS)return;
  ensureAudio();spin();
};

function spin(){
  spinning=true;cvs.classList.add('spinning');
  document.getElementById('wm').style.display='none';
  document.getElementById('qc').classList.remove('show');
  document.getElementById('sl').textContent='🎡';
  sndSpin();

  const extra=4+Math.random()*3;
  const target=angle+extra*2*Math.PI+Math.random()*2*Math.PI;
  const dur=3500,t0=performance.now(),a0=angle;
  let lastSeg=-1,lastTk=0;

  function anim(time){
    const el=time-t0,t=Math.min(el/dur,1);
    const ease=1-Math.pow(1-t,4);
    angle=a0+(target-a0)*ease;
    drawWheel(angle);
    const segArc=2*Math.PI/segs.length;
    const cur=Math.floor(((angle%(2*Math.PI))+2*Math.PI)/segArc)%segs.length;
    if(cur!==lastSeg&&time-lastTk>90){sndTick();lastSeg=cur;lastTk=time}
    if(t<1){requestAnimationFrame(anim)}
    else{spinning=false;cvs.classList.remove('spinning');
      document.getElementById('sl').textContent='GIRA!';
      showQ(winner(angle).f)}
  }
  requestAnimationFrame(anim);
}

function showQ(af){
  let pool=QS.filter((q,i)=>q.ans===af&&!used.includes(i));
  if(!pool.length)pool=QS.filter(q=>q.ans===af);
  const qi=QS.indexOf(pool[Math.floor(Math.random()*pool.length)]);
  used.push(qi);const q=QS[qi];
  answered=false;
  const c=document.getElementById('qc');
  c.className='q-card show';
  document.getElementById('qcat').textContent=q.cat;
  document.getElementById('qem').textContent=q.emoji;
  document.getElementById('qsc').textContent=q.scene;
  document.getElementById('qse').innerHTML=q.sent.replace('___','<span class="blank">???</span>');
  document.getElementById('fb').textContent='';
  document.getElementById('fb').className='feedback';
  document.getElementById('ex').classList.remove('show');
  document.getElementById('nb').classList.remove('show');

  const opts=['THIS','THESE','THAT','THOSE'].sort(()=>Math.random()-.5);
  const hints={THIS:'cerca + uno',THESE:'cerca + muchos',THAT:'lejos + uno',THOSE:'lejos + muchos'};
  const ad=document.getElementById('ans');ad.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='ans-btn';
    b.innerHTML=o+'<span class="hint">'+hints[o]+'</span>';
    b.onclick=()=>check(o,q);
    ad.appendChild(b);
  });
  c.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function check(ch,q){
  if(answered)return;answered=true;rnd++;
  document.querySelectorAll('.ans-btn').forEach(b=>{
    b.disabled=true;
    const w=b.textContent.split('\n')[0].replace(/cerca.*/,'').trim();
    if(w===q.ans)b.classList.add('correct');
    else if(w===ch)b.classList.add('wrong');
  });
  const fb=document.getElementById('fb'),c=document.getElementById('qc');
  if(ch===q.ans){
    ok++;fb.textContent='Genial! 🌟';fb.className='feedback ok';
    c.classList.add('correct-glow');confetti();sndOk();
  }else{
    no++;fb.textContent='Nooo! Era '+q.ans;fb.className='feedback no';
    c.classList.add('wrong-glow');sndNo();
  }
  document.getElementById('ex').innerHTML=q.exp;
  document.getElementById('ex').classList.add('show');
  updateScore();
  if(rnd>=ROUNDS)setTimeout(showTrophy,2000);
  else document.getElementById('nb').classList.add('show');
}

function updateScore(){
  document.getElementById('s-ok').textContent=ok;
  document.getElementById('s-no').textContent=no;
  const r=document.getElementById('stars');r.innerHTML='';
  STAR_AT.forEach(n=>{
    const s=document.createElement('span');
    s.className='star'+(ok>=n?' earned':'');
    s.textContent='⭐';
    if(ok===n)sndStar();
    r.appendChild(s);
  });
}

function nextRound(){
  document.getElementById('qc').classList.remove('show');
  document.getElementById('wm').style.display='block';
  document.getElementById('wm').innerHTML='Toca la ruleta para <span>girar!</span>';
}

function showTrophy(){
  document.getElementById('qc').classList.remove('show');
  document.getElementById('wa').style.display='none';
  document.getElementById('wm').style.display='none';
  const tr=document.getElementById('tr');tr.classList.add('show');
  const pct=Math.round(ok/ROUNDS*100);
  let title,msg,em;
  if(pct>=90){title="INCREIBLE!";msg="Sos un genio de THIS/THESE/THAT/THOSE!";em="🏆"}
  else if(pct>=70){title="MUY BIEN!";msg="Casi perfecto! Practica un poquito mas!";em="🥈"}
  else if(pct>=50){title="BUEN INTENTO!";msg="Vas bien! Acorda: Paso 1 Cerca/Lejos, Paso 2 Uno/Muchos";em="👏"}
  else{title="A SEGUIR PRACTICANDO!";msg="No pasa nada! Usa tu herramienta y probemos de nuevo";em="🎯"}
  document.getElementById('trem').textContent=em;
  document.getElementById('trt').textContent=title;
  document.getElementById('trf').textContent=ok+' de '+ROUNDS+' correctas ('+pct+'%)';
  const sf=document.getElementById('trs');sf.textContent='';
  STAR_AT.forEach(n=>{sf.textContent+=ok>=n?'⭐':'☆'});
  document.getElementById('trm').textContent=msg;
  if(pct>=70){sndFanfare();bigConfetti()}
  else if(pct>=50)sndOk();
}

function resetGame(){
  ok=0;no=0;rnd=0;answered=false;used=[];
  updateScore();
  document.getElementById('tr').classList.remove('show');
  document.getElementById('wa').style.display='block';
  document.getElementById('wm').style.display='block';
  document.getElementById('wm').innerHTML='Toca la ruleta para <span>girar!</span>';
  drawWheel(angle);
}

function confetti(){
  const cols=['#FFD600','#4FC3F7','#FF8A65','#81C784','#CE93D8','#E91E63'];
  for(let i=0;i<20;i++){
    const el=document.createElement('div');el.className='confetti';
    el.style.left=(15+Math.random()*70)+'vw';el.style.top='-10px';
    el.style.background=cols[Math.floor(Math.random()*cols.length)];
    el.style.animationDelay=(Math.random()*.3)+'s';
    el.style.width=(6+Math.random()*8)+'px';
    el.style.height=(6+Math.random()*8)+'px';
    el.style.borderRadius=Math.random()>.5?'50%':'2px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3000);
  }
}
function bigConfetti(){for(let i=0;i<4;i++)setTimeout(confetti,i*250)}
updateScore();
</script>
</body>
</html>
